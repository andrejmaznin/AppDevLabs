<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Mission Control</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Magic Mission Control</h1>
            <div class="actions">
                <input type="text" id="searchInput" placeholder="Поиск миссий...">
                <label class="btn btn-secondary">
                    Импорт
                    <input type="file" id="importInput" hidden>
                </label>
                <button id="clearBtn" class="btn btn-danger">Очистить</button>
            </div>
        </header>

        <main>
            <table id="missionTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Локация</th>
                        <th>Результат</th>
                        <th>Ущерб</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="missionTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </main>
    </div>

    <!-- Basic Report Modal -->
    <div id="basicReportModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('basicReportModal')">&times;</span>
            <div id="basicReportContent"></div>
        </div>
    </div>

    <!-- Tree Report Modal -->
    <div id="treeReportModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('treeReportModal')">&times;</span>
            <h2>Древовидный отчет</h2>
            <div id="treeReportContent" class="tree-container"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
